<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even or Odd Checker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Outfit", sans-serif;
            background: radial-gradient(circle at top left, #ffffff 0%, #f7f7ff 45%, #ecebff 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1f1558;
            padding: 20px;
        }

        .checker-card {
            width: min(520px, 100%);
            border: 2px solid rgba(39, 24, 126, 0.22);
            background: #ffffff;
            padding: 28px;
            border-radius: 20px;
            box-shadow: 0 14px 30px rgba(39, 24, 126, 0.16);
        }

        .checker-card h1 {
            text-align: center;
            color: #27187E;
            font-size: 2rem;
            line-height: 1.2;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }

        .intro {
            text-align: center;
            line-height: 1.6;
            font-size: 1rem;
            margin-bottom: 22px;
            color: #3d327d;
        }

        .checker-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checker-form label {
            font-weight: 600;
            font-size: 0.98rem;
            color: #27187E;
        }

        .checker-form input {
            border: 1.5px solid rgba(39, 24, 126, 0.28);
            border-radius: 10px;
            padding: 11px 12px;
            font: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .checker-form input:focus {
            outline: none;
            border-color: #27187E;
            box-shadow: 0 0 0 4px rgba(39, 24, 126, 0.14);
        }

        .checker-form button {
            margin-top: 4px;
            border: none;
            border-radius: 10px;
            background: #27187E;
            color: #f7f7ff;
            font: inherit;
            font-weight: 600;
            padding: 11px 16px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .checker-form button:hover {
            background: #3a2a9c;
            transform: translateY(-1px);
        }

        .result {
            margin-top: 18px;
            background: #f2f1ff;
            border-left: 4px solid #27187E;
            border-radius: 10px;
            padding: 12px 14px;
            min-height: 52px;
            line-height: 1.5;
            color: #2a2060;
        }

        @media (max-width: 540px) {
            .checker-card {
                padding: 20px;
            }

            .checker-card h1 {
                font-size: 1.55rem;
            }

            .intro {
                font-size: 0.95rem;
            }
        }
       
    </style>
</head>
<body>
    <div class="checker-card">
        <h1>Even or Odd Number Checker</h1>
        <p class="intro">
            Enter any whole number and click the button. The program checks the remainder after dividing by 2.
            If the remainder is 0, the number is even; otherwise, it is odd.
        </p>

        <form class="checker-form" id="checkerForm">
            <label for="numberInput">Enter a number:</label>
            <input type="number" id="numberInput" name="numberInput" placeholder="Example: 24" required>
            <button type="button" onclick="oddEvenCheck()">Check Number</button>
            <button type="button" onclick="printNumbers()">Print Numbers</button>
        </form>

        <div class="result" id="resultBox">Result will appear here.</div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
