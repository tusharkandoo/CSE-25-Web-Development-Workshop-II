<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System | Experiment 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-4">
        <div class="text-center mb-4">
            <h1 class="fw-bold">Employee Management System</h1>
            <p class="text-secondary mb-0">Experiment 5 - Arrays and Objects</p>
        </div>

        <div class="card glass mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">Add New Employee</h5>
                <div class="row g-3">
                    <div class="col-md-6 col-lg-3">
                        <label for="empName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="empName" placeholder="Rahul Sharma">
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <label for="empId" class="form-label">ID</label>
                        <input type="number" class="form-control" id="empId" placeholder="101">
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <label for="empSalary" class="form-label">Salary</label>
                        <input type="number" class="form-control" id="empSalary" placeholder="60000">
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <label for="empDept" class="form-label">Department</label>
                        <input type="text" class="form-control" id="empDept" placeholder="IT">
                    </div>
                </div>
                <div class="mt-3 d-flex flex-wrap gap-2">
                    <button class="btn btn-success" onclick="addEmployee()">Add Employee</button>
                    <span id="addMessage" class="small align-self-center"></span>
                </div>
            </div>
        </div>

        <div class="card glass mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">Operations</h5>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-outline-info" onclick="displayAllEmployees()">Display Employees</button>
                    <button class="btn btn-outline-warning" onclick="filterHighSalary()">Salary &gt; 50,000</button>
                    <button class="btn btn-outline-primary" onclick="calculateTotalSalary()">Total Salary</button>
                    <button class="btn btn-outline-light" onclick="calculateAverageSalary()">Average Salary</button>
                </div>

                <div class="row g-2 mt-3">
                    <div class="col-md-8 col-lg-6">
                        <input type="text" id="deptInput" class="form-control" placeholder="Enter department name">
                    </div>
                    <div class="col-md-4 col-lg-3">
                        <button class="btn btn-outline-success w-100" onclick="countByDepartment()">Count by Department</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="resultArea" class="card glass p-3 hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
