<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 6 - DOM Manipulation & Event Handling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1 id="heading">Welcome to JavaScript DOM</h1>
        <p class="subtitle">Experiment 6: DOM Manipulation & Event Handling</p>
        <section class="card">
            <h2>Try Your Message</h2>
            <input type="text" id="inputText" placeholder="Type new heading text">

            <div class="row">
                <label for="bgSelect">Background Theme:</label>
                <select id="bgSelect">
                    <option value="default">Default Cream</option>
                    <option value="sky">Sky Blue</option>
                    <option value="mint">Mint Green</option>
                    <option value="peach">Peach</option>
                </select>
            </div>

            <div class="button-grid">
                <button id="changeTextBtn">Change Heading</button>
                <button id="colorBtn">Quick Blue Background</button>
                <button id="fontBtn">Hover to Grow Heading</button>
                <button id="toggleBtn">Show/Hide Paragraph</button>
                <button id="resetBtn">Reset</button>
            </div>
        </section>

        <p id="para">This is a sample paragraph. Use buttons to hide/show me and observe DOM changes instantly.</p>
        <p id="status" aria-live="polite">Ready. Try any action above.</p>
    </main>

    <script src="script.js"></script>
</body>
</html>
