<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Button</title>

    <style>
        button {
            background-color: rgb(35, 35, 81);
            color: white;
            height: 5rem;
            width: 12rem;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 20px;
            display: block;
            justify-self: center;
            box-shadow: 0px 0px 10px 2px rgb(186, 249, 255);
            margin: 2rem auto;
        }
    </style>
</head>
<body>
    <!-- Adding of an Interactive button in HTML -->
    <button id="myButton" onclick="showAlert()">&lt; About Dev &gt;</button>

    <!-- Adding of JavaScript file for functionality -->
    <script src="./app.js"></script>
    
</body>
</html>
